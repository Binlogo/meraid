name: Release

# Triggered by pushing a version tag, e.g. `git tag v0.2.0 && git push --tags`.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          tar -czf meraid-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release meraid
        shell: bash

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/meraid.exe -DestinationPath meraid-${{ matrix.target }}.zip
        shell: pwsh

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            meraid-${{ matrix.target }}.tar.gz
            meraid-${{ matrix.target }}.zip

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    if: ${{ github.repository == 'Binlogo/meraid' }}
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Publishes only when a CARGO_REGISTRY_TOKEN secret is configured; if it
      # isn't (e.g. the release was published manually with `cargo publish`),
      # this step is skipped so the job stays green and never double-publishes.
      - name: Publish
        if: ${{ env.CARGO_REGISTRY_TOKEN != '' }}
        run: cargo publish --locked
